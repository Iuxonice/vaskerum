<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vaskerum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f7f5f2;
      --surface:  #ffffff;
      --surface2: #fbfaf8;
      --border:   #e0dbd4;
      --border2:  #cac4bc;
      --text:     #1a1916;
      --muted:    #7a746c;
      --hint:     #b0aa9e;
      --teal:     #1D9E75;
      --teal-dk:  #0F6E56;
      --teal-lt:  #e1f5ee;
      --red:      #c94040;
      --red-lt:   #fceaea;
      --taken-bg: #f0ede8;
      --closed:   #ece8e1;
      --radius:   10px;
      --radius-lg:16px;
      --shadow:   0 16px 40px rgba(42, 35, 24, 0.08);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(29,158,117,0.10), transparent 34rem),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem 1rem 4rem;
    }

    .page { max-width: 1060px; margin: 0 auto; }

    /* ── Header ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .logo { font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 9px; }
    .logo svg { opacity: 0.72; }
    .logo-sub { font-size: 13px; color: var(--muted); margin-top: 3px; }

    /* ── Week nav ── */
    .week-nav { display: flex; align-items: center; gap: 7px; }
    .week-nav button {
      width: 34px; height: 34px;
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text);
      transition: transform 0.1s, background 0.1s;
    }
    .week-nav button:hover:not(:disabled) { background: var(--bg); transform: translateY(-1px); }
    .week-nav button:disabled { opacity: 0.3; cursor: default; }
    #week-lbl { font-size: 13px; color: var(--muted); min-width: 150px; text-align: center; }

    /* ── Flat bar ── */
    .flat-bar {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 1rem;
      font-size: 13px; color: var(--muted);
      flex-wrap: wrap;
    }
    .flat-pill {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text);
      transition: border-color 0.15s, transform 0.1s;
      font-family: inherit;
    }
    .flat-pill:hover { border-color: var(--teal); transform: translateY(-1px); }
    .flat-hint { font-size: 11px; color: var(--hint); }

    .info-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 0.85rem 1rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
      font-size: 13px;
      color: var(--muted);
      display: flex;
      gap: 0.6rem;
      align-items: flex-start;
    }
    .info-card strong { color: var(--text); font-weight: 700; }

    /* ── Main layout ── */
    .booking-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 1rem;
      align-items: start;
    }
    .schedule-card,
    .panel-card {
      background: rgba(255,255,255,0.78);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }
    .schedule-card { padding: 1rem; overflow: hidden; }
    .panel-card {
      min-height: 170px;
      padding: 1rem;
      position: sticky;
      top: 1rem;
    }
    .panel-empty {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }
    .panel-empty strong { display: block; color: var(--text); font-size: 15px; margin-bottom: 0.3rem; }

    /* ── Grid ── */
    .grid-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px; }
    .grid {
      display: grid;
      grid-template-columns: 64px repeat(7, minmax(88px, 1fr));
      gap: 4px;
      min-width: 760px;
    }
    .gh {
      font-size: 12px; color: var(--muted);
      text-align: center;
      padding: 6px 4px 8px;
      line-height: 1.35;
      border-radius: var(--radius);
      background: var(--surface2);
      border: 1px solid transparent;
    }
    .gh.today { color: var(--teal-dk); font-weight: 700; border-color: var(--teal-lt); background: var(--teal-lt); }
    .gh .day-num { font-size: 16px; font-weight: 700; display: block; color: var(--text); }
    .hl {
      font-size: 11px; color: var(--muted);
      display: flex; align-items: center; justify-content: flex-end;
      padding-right: 6px;
      font-weight: 700;
      line-height: 1.2;
    }
    .slot {
      min-height: 42px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-size: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      color: var(--muted);
      transition: border-color 0.12s, background 0.12s, transform 0.1s;
      user-select: none;
      text-align: center;
      padding: 4px 3px;
    }
    .slot-time { font-size: 11px; font-weight: 700; color: var(--text); line-height: 1; }
    .slot-state { font-size: 10px; color: var(--muted); line-height: 1.15; }
    .slot:hover:not(.past):not(.taken):not(.closed):not(.loading) {
      border-color: var(--teal);
      background: var(--teal-lt);
      transform: translateY(-1px);
    }
    .slot:hover:not(.past):not(.taken):not(.closed):not(.loading) .slot-state { color: var(--teal-dk); }
    .slot.past { background: var(--bg); border-color: transparent; cursor: default; opacity: 0.45; }
    .slot.mine { background: var(--teal); border-color: var(--teal); color: #fff; }
    .slot.mine .slot-time, .slot.mine .slot-state { color: #fff; }
    .slot.mine:hover { background: var(--teal-dk); border-color: var(--teal-dk); }
    .slot.taken { background: var(--taken-bg); border-color: var(--border); color: var(--hint); cursor: default; }
    .slot.taken .slot-time { color: var(--muted); }
    .slot.closed { background: var(--closed); border-color: transparent; cursor: default; opacity: 0.75; }
    .slot.closed .slot-time, .slot.closed .slot-state { color: var(--hint); }
    .slot.loading { opacity: 0.5; cursor: wait; }

    /* ── Legend ── */
    .legend {
      display: flex; gap: 1.25rem; flex-wrap: wrap;
      margin-top: 0.85rem;
      font-size: 11px; color: var(--muted);
    }
    .li { display: flex; align-items: center; gap: 5px; }
    .ld { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
    .refresh-note { font-size: 11px; color: var(--hint); margin-top: 6px; }

    /* ── Action panel ── */
    .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .modal p { font-size: 13px; color: var(--muted); margin-bottom: 1rem; line-height: 1.5; }
    .modal .selection {
      background: var(--teal-lt);
      color: var(--teal-dk);
      border-radius: var(--radius);
      padding: 0.75rem;
      margin-bottom: 1rem;
      font-size: 13px;
      line-height: 1.45;
      border: 1px solid rgba(29,158,117,0.18);
    }
    .modal input[type=text] {
      width: 100%; padding: 9px 10px;
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      font-size: 14px; font-family: inherit;
      margin-bottom: 8px;
      outline: none;
      background: var(--surface);
      color: var(--text);
    }
    .modal input[type=text]:focus { border-color: var(--teal); }
    .modal input[type=text].err { border-color: var(--red); background: var(--red-lt); }
    .chk-row {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; color: var(--muted);
      margin-bottom: 1rem;
      cursor: pointer;
    }
    .chk-row input { cursor: pointer; accent-color: var(--teal); }
    .mbtns { display: flex; gap: 8px; }
    .mbtns button {
      flex: 1; padding: 10px;
      border-radius: var(--radius);
      border: 1px solid var(--border2);
      cursor: pointer;
      font-size: 14px; font-family: inherit;
      background: var(--surface);
      color: var(--text);
      transition: background 0.1s, transform 0.1s;
    }
    .mbtns button:hover { background: var(--bg); transform: translateY(-1px); }
    .btn-ok  { background: var(--teal)  !important; color: #fff !important; border-color: var(--teal)  !important; }
    .btn-ok:hover  { background: var(--teal-dk) !important; }
    .btn-del { background: var(--red)   !important; color: #fff !important; border-color: var(--red)   !important; }
    .btn-del:hover { background: #a83434 !important; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: #1a1916; color: #fff;
      padding: 9px 18px; border-radius: 999px; font-size: 13px;
      opacity: 0; transition: opacity 0.25s;
      pointer-events: none; white-space: nowrap;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
    }
    #toast.show { opacity: 1; }

    @media (max-width: 860px) {
      .booking-layout { grid-template-columns: 1fr; }
      .panel-card { position: static; order: 2; }
      .schedule-card { order: 1; }
    }

    @media (max-width: 500px) {
      body { padding: 1rem 0.75rem 3rem; }
      .logo { font-size: 18px; }
      .logo-sub { font-size: 12px; }
      .schedule-card, .panel-card { padding: 0.75rem; }
      .grid { grid-template-columns: 58px repeat(7, minmax(82px, 1fr)); min-width: 690px; }
      .slot { min-height: 44px; }
      .flat-hint { display: none; }
    }
  </style>
</head>
<body>
<div class="page">
  <header>
    <div>
      <div class="logo">
        <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="18" rx="2"/>
          <circle cx="12" cy="13" r="4"/>
          <path d="M6 7h.01M9 7h.01"/>
        </svg>
        Vaskerum
      </div>
      <div class="logo-sub">Book én vasketid — begge maskiner reserveres sammen.</div>
    </div>
    <div class="week-nav">
      <button id="prev-btn" title="Forrige uge">&#8249;</button>
      <span id="week-lbl"></span>
      <button id="next-btn" title="Næste uge">&#8250;</button>
    </div>
  </header>

  <div class="flat-bar">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Lejlighed:</span>
    <button class="flat-pill" id="flat-pill" title="Klik for at ændre">ikke sat</button>
    <span class="flat-hint">(gemmes i din browser)</span>
  </div>

  <div class="info-card">
    <span aria-hidden="true">ℹ️</span>
    <div><strong>Begge maskiner bookes samlet.</strong> Tiderne er 08–20 mandag-lørdag og 10–20 søndag.</div>
  </div>

  <div class="booking-layout">
    <section class="schedule-card" aria-label="Bookingkalender">
      <div class="grid-wrap">
        <div class="grid" id="grid"></div>
      </div>

      <div class="legend">
        <div class="li"><div class="ld" style="border:1px solid #cac4bc;background:#fff"></div>Ledig</div>
        <div class="li"><div class="ld" style="background:#1D9E75"></div>Din booking (klik for at aflyse)</div>
        <div class="li"><div class="ld" style="background:#f0ede8;border:1px solid #e0dbd4"></div>Optaget</div>
        <div class="li"><div class="ld" style="background:#ece8e1"></div>Lukket</div>
      </div>
      <div class="refresh-note">↻ Opdateres automatisk hvert minut</div>
    </section>

    <aside class="panel-card" id="modal-area" aria-live="polite"></aside>
  </div>
</div>

<div id="toast"></div>

<script>
  const HOURS = Array.from({ length: 13 }, (_, i) => i + 8); // 08–20
  const DAY_SHORT = ['Man','Tir','Ons','Tor','Fre','Lør','Søn'];
  const MACHINE_IDS = [0, 1];

  let weekStart  = getMon(new Date());
  let bookings   = {};
  let myFlat     = localStorage.getItem('vaskerum_flat') || '';
  let pending    = null;
  let busy       = false; // prevent double-clicks

  // ── Date helpers ──────────────────────────────────────────────────────────

  function getMon(d) {
    const dt = new Date(d);
    const day = dt.getDay();
    dt.setDate(dt.getDate() - (day === 0 ? 6 : day - 1));
    dt.setHours(0, 0, 0, 0);
    return dt;
  }

  function addDays(d, n) {
    const dt = new Date(d);
    dt.setDate(dt.getDate() + n);
    return dt;
  }

  // Important: local date, not UTC. toISOString() can shift the selected day.
  function fmtDate(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function parseLocalDate(dateStr) {
    const [y, m, d] = dateStr.split('-').map(Number);
    return new Date(y, m - 1, d, 0, 0, 0, 0);
  }

  function slotKey(dateStr, m, h) {
    return `${dateStr}-m${m}-h${h}`;
  }

  function slotKeys(dateStr, h) {
    return MACHINE_IDS.map(m => slotKey(dateStr, m, h));
  }

  function padHour(h) {
    return String(h).padStart(2, '0');
  }

  function timeLabel(h) {
    return `${padHour(h)}–${padHour(h + 1)}`;
  }

  function isSunday(d) {
    return d.getDay() === 0;
  }

  function isOpenAt(d, h) {
    return h >= (isSunday(d) ? 10 : 8) && h < 20;
  }

  function weekLabel(s) {
    const e = addDays(s, 6);
    const o = { day: 'numeric', month: 'short' };
    return `${s.toLocaleDateString('da-DK', o)} – ${e.toLocaleDateString('da-DK', o)}`;
  }

  function escapeHtml(value) {
    return String(value).replace(/[&<>'"]/g, ch => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
    }[ch]));
  }

  // ── API ───────────────────────────────────────────────────────────────────

  async function fetchBookings() {
    const res = await fetch('/api/bookings');
    if (!res.ok) throw new Error('Kunne ikke hente bookings');
    return res.json();
  }

  async function addBooking(key, flat) {
    const res = await fetch('/api/bookings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key, flat }),
    });
    if (res.status === 409) throw new Error('Tidspunktet er allerede optaget');
    if (!res.ok) throw new Error('Booking mislykkedes');
    return res.json();
  }

  async function removeBooking(key, flat) {
    const res = await fetch(`/api/bookings/${encodeURIComponent(key)}`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ flat }),
    });
    if (!res.ok) throw new Error('Sletning mislykkedes');
    return res.json();
  }

  // ── Init & polling ────────────────────────────────────────────────────────

  async function init() {
    updateFlatPill();
    showEmptyPanel();
    await refresh();
    setInterval(refresh, 60_000);
  }

  async function refresh() {
    try { bookings = await fetchBookings(); render(); }
    catch (e) { console.error(e); toast('Kunne ikke hente bookings'); }
  }

  // ── UI helpers ────────────────────────────────────────────────────────────

  function updateFlatPill() {
    document.getElementById('flat-pill').textContent = myFlat || 'ikke sat';
  }

  function toast(msg, dur = 2500) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), dur);
  }

  function getCombinedBooking(dateStr, h) {
    const keys = slotKeys(dateStr, h);
    const found = keys.map(key => ({ key, booking: bookings[key] })).filter(x => x.booking);
    return { keys, found, first: found[0] || null };
  }

  // ── Grid render ───────────────────────────────────────────────────────────

  function render() {
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const now   = new Date();
    const minW  = getMon(new Date());
    const maxW  = getMon(addDays(new Date(), 21));
    const days  = Array.from({ length: 7 }, (_, i) => addDays(weekStart, i));

    document.getElementById('week-lbl').textContent = weekLabel(weekStart);
    document.getElementById('prev-btn').disabled = weekStart <= minW;
    document.getElementById('next-btn').disabled = weekStart >= maxW;

    let html = '<div></div>';

    // Day headers
    days.forEach((d, i) => {
      const isToday = fmtDate(d) === fmtDate(today);
      html += `<div class="gh${isToday ? ' today' : ''}">
        ${DAY_SHORT[i]}<span class="day-num">${d.getDate()}</span>
      </div>`;
    });

    // Hour rows
    HOURS.forEach(h => {
      html += `<div class="hl">${timeLabel(h)}</div>`;
      days.forEach(d => {
        const dateStr = fmtDate(d);
        const combined = getCombinedBooking(dateStr, h);
        const bk = combined.first ? combined.first.booking : null;
        const isClosed = !isOpenAt(d, h);
        const isPast = d < today || (dateStr === fmtDate(today) && h <= now.getHours());
        let cls = 'slot', state = 'Ledig', onclick = '', title = '';

        if (isClosed) {
          cls += ' closed';
          state = 'Lukket';
          title = 'Lukket på dette tidspunkt';
        } else if (bk) {
          if (myFlat && combined.found.some(x => x.booking.flat === myFlat)) {
            cls += ' mine';
            state = 'Din booking';
            onclick = `delSlot('${dateStr}', ${h})`;
            title = 'Din booking – klik for at aflyse';
          } else {
            cls += ' taken';
            state = `Lej. ${escapeHtml(bk.flat)}`;
            title = `Optaget af lej. ${escapeHtml(bk.flat)}`;
          }
        } else if (isPast) {
          cls += ' past';
          state = 'Fortid';
          title = 'Fortid';
        } else {
          onclick = `bookSlot('${dateStr}', ${h})`;
          title = `Book begge maskiner kl. ${padHour(h)}:00–${padHour(h + 1)}:00`;
        }

        html += `<div class="${cls}" onclick="${onclick}" title="${title}" aria-label="${title}">
          <span class="slot-time">${timeLabel(h)}</span>
          <span class="slot-state">${state}</span>
        </div>`;
      });
    });

    document.getElementById('grid').innerHTML = html;
  }

  // ── Booking actions ───────────────────────────────────────────────────────

  function bookSlot(dateStr, h) {
    if (busy) return;
    const d = parseLocalDate(dateStr);
    if (!isOpenAt(d, h)) return;
    const combined = getCombinedBooking(dateStr, h);
    if (combined.found.length) {
      toast('Tidspunktet er allerede optaget');
      refresh();
      return;
    }
    if (myFlat) {
      doBook(dateStr, h, myFlat);
    } else {
      pending = { dateStr, h };
      showBookModal(dateStr, h);
    }
  }

  async function doBook(dateStr, h, flat) {
    busy = true;
    const keys = slotKeys(dateStr, h);
    const created = [];
    try {
      for (const key of keys) {
        await addBooking(key, flat);
        created.push(key);
      }
      keys.forEach(key => { bookings[key] = { flat, at: new Date().toISOString() }; });
      render();
      showEmptyPanel();
      toast('Booking bekræftet ✓');
    } catch (e) {
      // Avoid half-bookings if the second machine fails because of a race/conflict.
      await Promise.allSettled(created.map(key => removeBooking(key, flat)));
      toast(e.message);
      await refresh();
    } finally { busy = false; }
  }

  function delSlot(dateStr, h) {
    if (busy) return;
    showDeleteModal(dateStr, h);
  }

  async function confirmDelete(dateStr, h) {
    busy = true;
    closeModal();
    const keys = slotKeys(dateStr, h).filter(key => bookings[key] && bookings[key].flat === myFlat);
    try {
      await Promise.all(keys.map(key => removeBooking(key, myFlat)));
      keys.forEach(key => delete bookings[key]);
      render();
      showEmptyPanel();
      toast('Booking aflyst');
    } catch (e) {
      toast(e.message);
      await refresh();
    }
    finally { busy = false; }
  }

  // ── Panel ────────────────────────────────────────────────────────────────

  function showEmptyPanel() {
    document.getElementById('modal-area').innerHTML = `
      <div class="panel-empty">
        <strong>Vælg en tid</strong>
        Klik på en ledig tid i kalenderen. Bekræftelse, lejlighedsnummer og aflysning vises her.
      </div>`;
  }

  function showBookModal(dateStr, h) {
    const d    = parseLocalDate(dateStr);
    const dayN = d.toLocaleDateString('da-DK', { weekday: 'long', day: 'numeric', month: 'long' });
    setModal(`
      <h3>Book vasketid</h3>
      <div class="selection"><strong>${dayN}</strong><br>kl. ${padHour(h)}:00 – ${padHour(h + 1)}:00<br>Begge maskiner reserveres.</div>
      <input type="text" id="fi" placeholder="Lejlighedsnr. (f.eks. 3A)" autocomplete="off">
      <label class="chk-row"><input type="checkbox" id="sv" checked> Husk mit lejlighedsnummer</label>
      <div class="mbtns">
        <button onclick="closeModal()">Annuller</button>
        <button class="btn-ok" onclick="confirmBook()">Book</button>
      </div>`);
    focus('fi', () => keyEnter('fi', confirmBook));
  }

  function showDeleteModal(dateStr, h) {
    const d    = parseLocalDate(dateStr);
    const dayN = d.toLocaleDateString('da-DK', { weekday: 'long', day: 'numeric', month: 'long' });
    setModal(`
      <h3>Aflyse booking?</h3>
      <div class="selection"><strong>${dayN}</strong><br>kl. ${padHour(h)}:00 – ${padHour(h + 1)}:00<br>Begge maskiner frigives.</div>
      <p>Er du sikker på, at du vil aflyse denne booking?</p>
      <div class="mbtns">
        <button onclick="closeModal()">Behold</button>
        <button class="btn-del" onclick="confirmDelete('${dateStr}', ${h})">Aflys</button>
      </div>`);
  }

  function showFlatEdit() {
    setModal(`
      <h3>Lejlighedsnummer</h3>
      <p>Gemmes i din browser – du skal kun taste det én gang.</p>
      <input type="text" id="fi" placeholder="f.eks. 3A" value="${escapeHtml(myFlat)}" autocomplete="off">
      <div class="mbtns">
        <button onclick="closeModal()">Annuller</button>
        <button class="btn-ok" onclick="saveFlat()">Gem</button>
      </div>`);
    focus('fi', () => { document.getElementById('fi').select(); keyEnter('fi', saveFlat); });
  }

  function setModal(inner) {
    document.getElementById('modal-area').innerHTML = `<div class="modal">${inner}</div>`;
  }

  function closeModal() {
    pending = null;
    showEmptyPanel();
  }

  function focus(id, cb) {
    setTimeout(() => { const el = document.getElementById(id); if (el) { el.focus(); cb && cb(); } }, 40);
  }

  function keyEnter(id, fn) {
    const el = document.getElementById(id);
    if (el) el.addEventListener('keydown', e => { if (e.key === 'Enter') fn(); });
  }

  async function confirmBook() {
    const fi  = document.getElementById('fi');
    const val = fi ? fi.value.trim() : '';
    if (!val) { if (fi) fi.classList.add('err'); return; }
    const save = document.getElementById('sv');
    if (save && save.checked) {
      myFlat = val;
      localStorage.setItem('vaskerum_flat', val);
      updateFlatPill();
    }
    const booking = pending;
    closeModal();
    if (booking) { await doBook(booking.dateStr, booking.h, val); pending = null; }
  }

  function saveFlat() {
    const fi  = document.getElementById('fi');
    const val = fi ? fi.value.trim() : '';
    if (!val) { if (fi) fi.classList.add('err'); return; }
    myFlat = val;
    localStorage.setItem('vaskerum_flat', val);
    updateFlatPill();
    closeModal();
    render();
    toast('Lejlighedsnummer gemt');
  }

  // ── Nav ───────────────────────────────────────────────────────────────────

  document.getElementById('prev-btn').onclick = () => { weekStart = addDays(weekStart, -7); render(); };
  document.getElementById('next-btn').onclick = () => { weekStart = addDays(weekStart,  7); render(); };
  document.getElementById('flat-pill').onclick = showFlatEdit;

  // ── Go ────────────────────────────────────────────────────────────────────

  init();
</script>
</body>
</html>
